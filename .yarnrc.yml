# Keep the classic node_modules layout (default is "pnp"); avoids PnP-compat
# work for tools like @vercel/ncc, ts-jest, and release-please.
nodeLinker: node-modules

# Explicit allow-list for git-protocol dependencies. Required because we
# fetch release-please from grafana/release-please (see dependencies).
approvedGitRepositories:
  - "https://github.com/grafana/*"
  - "ssh://git@github.com/grafana/*"

# Refuse to install package versions younger than 7 days. Mitigates supply-chain
# attacks that rely on freshly published malicious versions. Docs:
# https://yarnpkg.com/configuration/yarnrc#npmMinimalAgeGate. Passing 7d as
# minutes, known bug parsing "7d" type strings
# https://github.com/yarnpkg/berry/issues/6991
npmMinimalAgeGate: 10080
