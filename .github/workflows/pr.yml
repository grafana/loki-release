---
name: Check PR
on:
  pull_request: {}
jobs:
  lint:
    runs-on: ubuntu-x64
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable Corepack
        run: corepack enable
      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/berry/cache
            .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - run: yarn run lint
  actions:
    runs-on: ubuntu-x64
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable Corepack
        run: corepack enable
      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/berry/cache
            .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - run: yarn run actions
      - run: |
          git diff --name-only -- "actions/**/*.js" | xargs --no-run-if-empty git diff --exit-code -- \
            || (echo "Change to actions detected, please run 'yarn run actions' and commit the changes" && false)
  workflows:
    runs-on: ubuntu-x64
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable Corepack
        run: corepack enable
      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/berry/cache
            .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - name: Cache jsonnet binary
        id: cache-jsonnet
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/jsonnet
            /usr/local/bin/jsonnetfmt
          key: jsonnet-v0.22.0-linux-amd64
      - name: Install jsonnet
        if: steps.cache-jsonnet.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/go-jsonnet.tar.gz \
            https://github.com/google/go-jsonnet/releases/download/v0.22.0/go-jsonnet_0.22.0_linux_amd64.tar.gz
          echo "e87a93ea44e34da92c15636205c7f2240bf3ac92d00ccb855dbb4e7e03ea6941  /tmp/go-jsonnet.tar.gz" | sha256sum --check
          tar xzf /tmp/go-jsonnet.tar.gz -C /usr/local/bin jsonnet jsonnetfmt
          rm /tmp/go-jsonnet.tar.gz
      - run: yarn install --immutable
      - run: yarn run workflows
      - run: |
          git diff --name-only -w -- ".github/workflows/*.yml" | xargs --no-run-if-empty git diff -w --exit-code -- \
            || (echo "Change to workflows detected, please run 'yarn run workflows' and commit the changes" && false)
  test:
    runs-on: ubuntu-x64
    permissions:
      contents: write
      pull-requests: write
    needs:
      - lint
      - actions
      - workflows
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable Corepack
        run: corepack enable
      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/berry/cache
            .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-
      - run: yarn install --immutable
      - run: yarn run ci-test
  check-title:
    runs-on: ubuntu-x64
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017  # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
permissions:
  contents: "write"
  pull-requests: "write"
