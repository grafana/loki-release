name: Backport PR Creator
on:
  pull_request:
    types:
      - closed
      - labeled

jobs:
  main:
    runs-on: ubuntu-x64
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Actions
        uses: actions/checkout@v3
        with:
          repository: "grafana/grafana-github-actions"
          path: ./actions
          ref: main
          "persist-credentials": false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable corepack
        run: corepack enable
      - name: Install Actions
        # grafana/grafana-github-actions uses yarn 4 (engines.npm = please-use-yarn).
        # --immutable honors its checked-in yarn.lock.
        working-directory: ./actions
        run: yarn install --immutable
      - name: Generate GitHub App Token
        id: app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: loki-gh-app
      - name: Run backport
        uses: ./actions/backport
        with:
          token: ${{ steps.app-token.outputs.token }}
          labelsToAdd: "backport"
          title: "chore: [{{base}}] {{originalTitle}}"
permissions:
  contents: "write"
  pull-requests: "write"
